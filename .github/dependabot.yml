version: 2

# Automated dependency update proposals for SJMS 2.5.
#
# Policy:
# - Weekly cadence, Mondays 07:00 UTC, to batch noise into one day.
# - Minor and patch updates are grouped per ecosystem so a single
#   review absorbs a week's worth of low-risk updates; major
#   version bumps are kept as individual PRs so each receives
#   dedicated BugBot review and human sign-off.
# - `open-pull-requests-limit` caps churn to a reviewable volume.
# - Commits use the repository's conventional-commit style so they
#   flow through the existing PR template and changelog conventions.

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/London
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
      - npm
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/London
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
      - npm
      - server
    groups:
      server-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/London
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
      - npm
      - client
    groups:
      client-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
      timezone: Europe/London
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
