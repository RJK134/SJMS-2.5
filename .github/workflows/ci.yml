name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server-quality:
    name: Server quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: npx prisma validate --schema=prisma/schema.prisma

      - name: TypeScript check (server)
        working-directory: server
        run: npx tsc --noEmit

      - name: Unit tests with coverage (server)
        working-directory: server
        # Coverage thresholds are owned by server/vitest.config.ts so
        # local runs match CI exactly. Do not add CLI overrides here.
        run: npx vitest run --config vitest.config.ts --coverage --reporter=default

      - name: Publish server coverage summary
        if: always()
        run: |
          set -u
          SUMMARY_PATH=server/coverage/coverage-summary.json
          if [ ! -s "$SUMMARY_PATH" ]; then
            {
              echo '## Server coverage'
              echo ''
              echo "> Coverage summary not found at \`$SUMMARY_PATH\`."
              echo '> The unit-test step above is the authoritative gate; this is reporting-only.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = 'server/coverage/coverage-summary.json';
          try {
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            const total = summary.total ?? {};
            const pct = (m) => (m && typeof m.pct === 'number') ? `${m.pct}%` : 'n/a';
            console.log('## Server coverage');
            console.log('');
            console.log('| Metric | Coverage |');
            console.log('| --- | ---: |');
            console.log(`| Lines | ${pct(total.lines)} |`);
            console.log(`| Statements | ${pct(total.statements)} |`);
            console.log(`| Functions | ${pct(total.functions)} |`);
            console.log(`| Branches | ${pct(total.branches)} |`);
          } catch (err) {
            console.log('## Server coverage');
            console.log('');
            console.log('> Coverage summary could not be parsed: ' + err.message);
            console.log('> The unit-test step above is the authoritative gate; this is reporting-only.');
          }
          NODE

      - name: Upload server coverage artefact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: server/coverage
          if-no-files-found: warn

  client-quality:
    name: Client quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: TypeScript check (client)
        working-directory: client
        run: npx tsc --noEmit

  lint-advisory:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory while the KI-P14-001 ESLint bootstrap is bedding in. The
    # server and client typecheck jobs above remain the authoritative
    # PR gates. A follow-on KI tracks the work to ratchet this gate to
    # blocking once the baseline is triaged.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Lint server (advisory)
        working-directory: server
        continue-on-error: true
        run: |
          set -u
          mkdir -p ../.lint-reports
          npx eslint src --format json --output-file ../.lint-reports/server.json || true
          npx eslint src --format stylish || true

      - name: Lint client (advisory)
        working-directory: client
        continue-on-error: true
        run: |
          set -u
          mkdir -p ../.lint-reports
          npx eslint src --format json --output-file ../.lint-reports/client.json || true
          npx eslint src --format stylish || true

      - name: Publish lint summary
        if: always()
        run: |
          set -u
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = require('path');
          const targets = [
            { name: 'Server', file: '.lint-reports/server.json' },
            { name: 'Client', file: '.lint-reports/client.json' },
          ];
          console.log('## Lint (advisory)');
          console.log('');
          console.log('| Workspace | Files scanned | Errors | Warnings |');
          console.log('| --- | ---: | ---: | ---: |');
          for (const t of targets) {
            try {
              if (!fs.existsSync(t.file)) {
                console.log(`| ${t.name} | _report missing_ | n/a | n/a |`);
                continue;
              }
              const raw = fs.readFileSync(t.file, 'utf8').trim();
              if (!raw) {
                console.log(`| ${t.name} | _empty report_ | n/a | n/a |`);
                continue;
              }
              const data = JSON.parse(raw);
              const files = Array.isArray(data) ? data.length : 0;
              let errors = 0, warnings = 0;
              for (const f of (Array.isArray(data) ? data : [])) {
                errors += (f.errorCount || 0);
                warnings += (f.warningCount || 0);
              }
              console.log(`| ${t.name} | ${files} | ${errors} | ${warnings} |`);
            } catch (err) {
              console.log(`| ${t.name} | _parse error_ | n/a | n/a |`);
              console.log('');
              console.log('> ' + err.message);
            }
          }
          console.log('');
          console.log('> Advisory only. Typecheck and unit tests remain the authoritative gates.');
          console.log('> Tracked under KI-P14-001 (bootstrap) and the follow-on baseline-triage KI.');
          NODE

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: .lint-reports
          if-no-files-found: warn
